<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Punyakshethra Tour Co. — Seat Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --paper: #F6F1E7;
      --paper-dim: #EDE6D6;
      --ink: #1B1F3B;
      --ink-soft: #4A4E68;
      --amber: #E8A33D;
      --teal: #2F6F6E;
      --clay: #C1502E;
      --line: #D8CFBB;
      --muted: #6B6558;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 32px 16px 60px;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ---------- Header / ticket stub ---------- */
    .ticket-head {
      background: var(--ink);
      color: var(--paper);
      border-radius: 14px 14px 0 0;
      padding: 22px 26px 18px;
      position: relative;
      overflow: hidden;
    }

    .ticket-head::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -40px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(232, 163, 61, 0.35), transparent 70%);
    }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--amber);
      margin: 0 0 6px;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      margin: 0 0 4px;
      line-height: 1.1;
    }

    .route {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #C9CADB;
      margin: 0;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      padding: 10px 26px;
      background: var(--ink);
    }

    .admin-toggle {
      position: relative;
      z-index: 5;
      background: transparent;
      border: 1px solid rgba(246, 241, 231, 0.35);
      color: var(--paper);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: .05em;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: background .15s ease;
    }

    .admin-toggle:hover {
      background: rgba(246, 241, 231, 0.12);
    }

    .admin-toggle.active {
      background: var(--amber);
      color: var(--ink);
      border-color: var(--amber);
      font-weight: 700;
    }

    /* perforation */
    .perf {
      height: 0;
      border-top: 2px dashed #C9CADB;
      position: relative;
      background: var(--ink);
    }

    .perf::before,
    .perf::after {
      content: "";
      position: absolute;
      top: -10px;
      width: 20px;
      height: 20px;
      background: var(--paper);
      border-radius: 50%;
    }

    .perf::before {
      left: -10px;
    }

    .perf::after {
      right: -10px;
    }

    /* ---------- Body card ---------- */
    .card {
      background: #fff;
      border-radius: 0 0 14px 14px;
      padding: 26px;
      box-shadow: 0 12px 30px rgba(27, 31, 59, 0.08);
    }

    .legend {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      display: inline-block;
    }

    /* ---------- Bus map ---------- */
    .bus {
      background: var(--paper-dim);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px 16px 24px;
    }

    .cockpit {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px 16px;
      margin-bottom: 16px;
      border-bottom: 1px dashed var(--line);
    }

    .cockpit .label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .wheel {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 4px solid var(--ink);
      position: relative;
      opacity: .85;
    }

    .wheel::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 26px;
      background: var(--ink);
      transform: translate(-50%, -50%);
    }

    .wheel::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 26px;
      height: 4px;
      background: var(--ink);
      transform: translate(-50%, -50%);
    }

    .rows {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      align-items: center;
    }

    .row.full {
      grid-template-columns: repeat(5, 1fr);
    }

    .aisle-gap {
      visibility: hidden;
    }

    .seat {
      aspect-ratio: 1/0.85;
      border-radius: 9px 9px 5px 5px;
      border: none;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: var(--teal);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .1s ease, box-shadow .1s ease;
      position: relative;
    }

    .seat:hover:not(.booked):not(.selected) {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(47, 111, 110, 0.35);
    }

    .seat.booked {
      background: var(--clay);
      cursor: pointer;
    }

    .seat.selected {
      background: var(--amber);
      color: var(--ink);
    }

    .seat:disabled {
      cursor: not-allowed;
    }

    .row-tag {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      text-align: center;
      margin-top: -4px;
    }

    /* ---------- Panel ---------- */
    .panel {
      margin-top: 22px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 16px 18px;
      background: #FBF8F1;
    }

    .panel h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      margin: 0 0 10px;
    }

    .panel .seat-code {
      font-family: 'Space Mono', monospace;
      color: var(--amber);
      background: var(--ink);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      background: #fff;
    }

    .field input:focus {
      outline: 2px solid var(--teal);
      outline-offset: 1px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button.primary,
    button.danger,
    button.ghost {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .03em;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    button.primary {
      background: var(--ink);
      color: var(--paper);
    }

    button.primary:hover {
      background: #2A2F55;
    }

    button.danger {
      background: var(--clay);
      color: #fff;
    }

    button.danger:hover {
      background: #A8421F;
    }

    button.ghost {
      background: transparent;
      color: var(--ink-soft);
      border: 1px solid var(--line);
    }

    button.ghost:hover {
      background: var(--paper-dim);
    }

    .status {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      margin-top: 10px;
      color: var(--teal);
    }

    .status.err {
      color: var(--clay);
    }

    /* ---------- Footer stub ---------- */
    .stub {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px dashed var(--line);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .stub b {
      color: var(--ink);
    }

    /* ---------- Modal ---------- */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(27, 31, 59, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      max-width: 320px;
      width: 100%;
    }

    .modal h3 {
      font-family: 'Space Grotesk', sans-serif;
      margin: 0 0 6px;
    }

    .modal p {
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 14px;
      font-family: 'Space Mono', monospace;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width:420px) {
      h1 {
        font-size: 22px;
      }

      .seat {
        font-size: 10.5px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="ticket-head">
      <p class="eyebrow">Boarding Pass · Punyakshethra Touring Co.</p>
      <h1>Seat Selection</h1>
      <p class="route">MOUNTAIN LOOP EXPRESS · 33-SEAT COACH · GATE 1</p>
    </div>
    <div class="toolbar">
      <button class="admin-toggle" id="adminToggle">🔒 Admin</button>
    </div>
    <div class="perf"></div>

    <div class="card">
      <div class="legend">
        <span><i class="swatch" style="background:var(--teal)"></i> Available</span>
        <span><i class="swatch" style="background:var(--amber)"></i> Selected</span>
        <span><i class="swatch" style="background:var(--clay)"></i> Booked</span>
      </div>

      <div class="bus">
        <div class="cockpit">
          <span class="label">← Front of coach</span>
          <div class="wheel"></div>
        </div>
        <div class="rows" id="rows"></div>
      </div>

      <div class="panel hidden" id="panel"></div>

      <div class="stub">
        <span>Seats booked: <b id="bookedCount">0</b> / 33</span>
        <span id="modeTag">Mode: Passenger</span>
      </div>
    </div>
  </div>

  <div class="modal-bg hidden" id="loginModal">
    <div class="modal">
      <h3>Admin sign-in</h3>
      <!-- <p>Demo password: admin123</p> -->
      <div class="field">
        <label>Password</label>
        <input type="password" id="adminPass">
      </div>
      <div class="btn-row">
        <button class="primary" id="loginBtn">Sign in</button>
        <button class="ghost" id="loginCancel">Cancel</button>
      </div>
      <div class="status err hidden" id="loginErr">Incorrect password.</div>
    </div>
  </div>

  <script>
    const TOTAL_SEATS = 33;
    const ADMIN_PASSWORD = "admin123";
    const APP_KEY = "p93wldg9";
    const STORAGE_KEY = "seats";
    const API_URL = "https://keyvalue.immanuel.co/api/KeyVal";

    let seats = {};        // seatNumber -> { name } or absent = available
    let isAdmin = false;
    let selectedSeat = null;

    const rowsEl = document.getElementById('rows');
    const panelEl = document.getElementById('panel');
    const adminToggle = document.getElementById('adminToggle');
    const loginModal = document.getElementById('loginModal');
    const bookedCountEl = document.getElementById('bookedCount');
    const modeTag = document.getElementById('modeTag');

    function seatLayout() {
      // rows of 4 (2 | aisle | 2) for seats 1-28, then one row of 5 for seats 29-33
      const rows = [];
      let n = 1;
      for (let r = 0; r < 7; r++) {
        rows.push({ seats: [n, n + 1, n + 2, n + 3], full: false });
        n += 4;
      }
      rows.push({ seats: [n, n + 1, n + 2, n + 3, n + 4], full: true });
      return rows;
    }

    function renderRows() {
      rowsEl.innerHTML = '';
      seatLayout().forEach((row, idx) => {
        const rowEl = document.createElement('div');
        rowEl.className = 'row' + (row.full ? ' full' : '');
        if (row.full) {
          row.seats.forEach(s => rowEl.appendChild(seatButton(s)));
        } else {
          rowEl.appendChild(seatButton(row.seats[0]));
          rowEl.appendChild(seatButton(row.seats[1]));
          const gap = document.createElement('div');
          gap.className = 'aisle-gap';
          rowEl.appendChild(gap);
          rowEl.appendChild(seatButton(row.seats[2]));
          rowEl.appendChild(seatButton(row.seats[3]));
        }
        rowsEl.appendChild(rowEl);
      });
    }

    function seatButton(num) {
      const btn = document.createElement('button');
      btn.className = 'seat';
      btn.textContent = num;
      const booking = seats[num];
      if (booking) {
        btn.classList.add('booked');
        btn.title = 'Booked by ' + booking.name;
      }
      if (selectedSeat === num) {
        btn.classList.add('selected');
      }
      btn.addEventListener('click', () => onSeatClick(num));
      return btn;
    }

    function onSeatClick(num) {
      selectedSeat = num;
      renderRows();
      renderPanel();
    }

    function renderPanel() {
      if (selectedSeat === null) {
        panelEl.classList.add('hidden');
        panelEl.innerHTML = '';
        return;
      }
      panelEl.classList.remove('hidden');
      const booking = seats[selectedSeat];

      if (!booking) {
        // available seat -> booking form
        panelEl.innerHTML = `
      <h3>Seat <span class="seat-code">${selectedSeat}</span> — reserve this seat</h3>
      <div class="field">
        <label>Passenger name</label>
        <input type="text" id="nameInput" placeholder="e.g. Puneeth Kumar" maxlength="40">
      </div>
      <div class="btn-row">
        <button class="primary" id="saveBtn">Save booking</button>
        <button class="ghost" id="clearSelectBtn">Cancel</button>
      </div>
      <div class="status hidden" id="panelStatus"></div>
    `;
        document.getElementById('saveBtn').addEventListener('click', saveBooking);
        document.getElementById('clearSelectBtn').addEventListener('click', () => { selectedSeat = null; renderRows(); renderPanel(); });
        document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') saveBooking(); });
      } else if (!isAdmin) {
        // booked, viewing as passenger
        panelEl.innerHTML = `
      <h3>Seat <span class="seat-code">${selectedSeat}</span> — already booked</h3>
      <p style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);margin:0 0 12px;">Reserved by ${escapeHtml(booking.name)}. Only an admin can change this booking.</p>
      <div class="btn-row">
        <button class="ghost" id="clearSelectBtn2">Close</button>
      </div>
    `;
        document.getElementById('clearSelectBtn2').addEventListener('click', () => { selectedSeat = null; renderRows(); renderPanel(); });
      } else {
        // booked, admin modify mode
        panelEl.innerHTML = `
      <h3>Seat <span class="seat-code">${selectedSeat}</span> — modify booking (admin)</h3>
      <div class="field">
        <label>Passenger name</label>
        <input type="text" id="nameInput" value="${escapeHtml(booking.name)}" maxlength="40">
      </div>
      <div class="btn-row">
        <button class="primary" id="saveBtn">Update name</button>
        <button class="danger" id="clearBookingBtn">Clear booking</button>
        <button class="ghost" id="clearSelectBtn3">Cancel</button>
      </div>
      <div class="status hidden" id="panelStatus"></div>
    `;
        document.getElementById('saveBtn').addEventListener('click', saveBooking);
        document.getElementById('clearBookingBtn').addEventListener('click', clearBooking);
        document.getElementById('clearSelectBtn3').addEventListener('click', () => { selectedSeat = null; renderRows(); renderPanel(); });
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showPanelStatus(msg, isErr) {
      const el = document.getElementById('panelStatus');
      if (!el) return;
      el.textContent = msg;
      el.classList.remove('hidden');
      el.classList.toggle('err', !!isErr);
    }

    function serializeSeats(seatsObj) {
      const parts = [];
      for (const num in seatsObj) {
        if (seatsObj[num] && seatsObj[num].name) {
          const safeName = seatsObj[num].name.replace(/[-_]/g, ' ').trim();
          parts.push(`${num}-${encodeURIComponent(safeName)}`);
        }
      }
      return parts.join('_');
    }

    function parseSeatsString(str) {
      const result = {};
      if (!str || str === '""' || str === '[]' || str === '{}') return result;
      if (str.startsWith('"') && str.endsWith('"')) {
        str = str.slice(1, -1);
      }
      if (!str) return result;
      const parts = str.split('_');
      parts.forEach(part => {
        const firstDash = part.indexOf('-');
        if (firstDash !== -1) {
          const num = part.substring(0, firstDash);
          const name = part.substring(firstDash + 1);
          if (num && name) {
            result[num] = { name: decodeURIComponent(name) };
          }
        }
      });
      return result;
    }

    async function loadSeatsQuietly() {
      try {
        const res = await fetch(`${API_URL}/GetValue/${APP_KEY}/${STORAGE_KEY}`);
        if (res.ok) {
          const rawData = await res.json();
          seats = parseSeatsString(rawData);
        }
      } catch (e) {
        console.error("Load seats error", e);
      }
    }

    async function syncSeats() {
      await loadSeatsQuietly();
      renderRows();
      updateStub();
      if (selectedSeat !== null) {
        const nameInput = document.getElementById('nameInput');
        const activeEl = document.activeElement;
        const isTyping = activeEl && activeEl.id === 'nameInput';
        if (!isTyping) {
          renderPanel();
        } else {
          const isBookedNow = !!seats[selectedSeat];
          if (isBookedNow && !isAdmin) {
            renderPanel();
          }
        }
      }
    }

    async function loadSeats() {
      await loadSeatsQuietly();
      renderRows();
      updateStub();
      if (selectedSeat !== null) {
        renderPanel();
      }
    }

    async function persistSeats(serializedStr) {
      const res = await fetch(`${API_URL}/UpdateValue/${APP_KEY}/${STORAGE_KEY}/${encodeURIComponent(serializedStr)}`, {
        method: 'POST',
        headers: {
          'Content-Length': '0'
        }
      });
      if (!res.ok) {
        throw new Error("HTTP error: " + res.status);
      }
      const data = await res.text();
      if (data !== "true") {
        throw new Error("Failed to write to KV store: " + data);
      }
    }

    async function saveBooking() {
      const input = document.getElementById('nameInput');
      const name = input.value.trim();
      if (!name) {
        showPanelStatus('Enter a passenger name before saving.', true);
        return;
      }

      showPanelStatus('Saving booking...', false);
      try {
        await loadSeatsQuietly();
        if (seats[selectedSeat] && !isAdmin) {
          showPanelStatus(`Seat ${selectedSeat} was just booked by ${seats[selectedSeat].name} on another device.`, true);
          renderRows();
          updateStub();
          return;
        }

        seats[selectedSeat] = { name };
        const serialized = serializeSeats(seats);
        await persistSeats(serialized);

        renderRows();
        updateStub();
        showPanelStatus('Booking saved.', false);
      } catch (e) {
        console.error("Save error", e);
        showPanelStatus('Error saving booking. Please try again.', true);
      }
    }

    async function clearBooking() {
      showPanelStatus('Clearing booking...', false);
      try {
        await loadSeatsQuietly();
        delete seats[selectedSeat];
        const serialized = serializeSeats(seats);
        await persistSeats(serialized);

        selectedSeat = null;
        renderRows();
        renderPanel();
        updateStub();
      } catch (e) {
        console.error("Clear error", e);
        showPanelStatus('Error clearing booking. Please try again.', true);
      }
    }

    function updateStub() {
      bookedCountEl.textContent = Object.keys(seats).length;
      modeTag.textContent = 'Mode: ' + (isAdmin ? 'Admin' : 'Passenger');
    }

    // ---------- Admin login ----------
    adminToggle.addEventListener('click', () => {
      if (isAdmin) {
        isAdmin = false;
        adminToggle.textContent = '🔒 Admin';
        adminToggle.classList.remove('active');
        updateStub();
        renderPanel();
      } else {
        loginModal.classList.remove('hidden');
        document.getElementById('adminPass').value = '';
        document.getElementById('loginErr').classList.add('hidden');
      }
    });

    document.getElementById('loginCancel').addEventListener('click', () => {
      loginModal.classList.add('hidden');
    });

    document.getElementById('loginBtn').addEventListener('click', attemptLogin);
    document.getElementById('adminPass').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

    function attemptLogin() {
      const pass = document.getElementById('adminPass').value;
      if (pass === ADMIN_PASSWORD) {
        isAdmin = true;
        adminToggle.textContent = '🔓 Admin';
        adminToggle.classList.add('active');
        loginModal.classList.add('hidden');
        updateStub();
        renderPanel();
      } else {
        document.getElementById('loginErr').classList.remove('hidden');
      }
    }

    // ---------- Init ----------
    loadSeats();
    setInterval(syncSeats, 5000);
  </script>
</body>

</html>
